# Display strings for the "Excel Export with Protection" smart service.
#
# No locale suffix (not excelExportSmartService_en_US.properties): confirmed
# against lowcodemindsglobal/appian-header-match-plugin, a real, successfully
# deployed sibling plug-in from this org, whose bundle is a bare
# "aiintelligence.properties" with no locale suffix at all. This still works
# for en_US because java.util.ResourceBundle falls back to the locale-less
# base file when no locale-specific variant exists; add
# excelExportSmartService_<locale>.properties files alongside this one if
# other languages are needed later.
#
# Every key is prefixed with the smart-service key ("excelExportSmartService"),
# using .label/.description - also matching that same reference plug-in's
# convention (its keys look like "aiintelligence.input.providerId.label")
# rather than the bare "name"/"input.<Name>.displayName"/"input.<Name>.comment"
# shown on Appian's docs page.

excelExportSmartService.name=Excel Export with Protection
excelExportSmartService.description=Exports Appian data rows to a column-protected Excel (.xlsx) document.

excelExportSmartService.input.dataRowsJson.label=Data Rows (JSON)
excelExportSmartService.input.dataRowsJson.description=The records to export, as a JSON-encoded array of objects keyed by column name (e.g. a!toJson(rows)). Not a native Dictionary array input: Appian's plugin loader has no built-in type mapping for that, so this node accepts JSON text instead and parses it internally.

excelExportSmartService.input.allColumns.label=All Columns
excelExportSmartService.input.allColumns.description=Every column name to include in the export, in the order they should appear.

excelExportSmartService.input.editableColumns.label=Editable Columns
excelExportSmartService.input.editableColumns.description=Column names (must be a subset of All Columns) that stay unlocked for the end user. Every other column, and all headers, are locked.

excelExportSmartService.input.targetFolderId.label=Target Folder ID
excelExportSmartService.input.targetFolderId.description=The Appian folder where the generated Excel document is saved.
excelExportSmartService.input.targetFolder.label=Target Folder
excelExportSmartService.input.targetFolder.description=The Appian folder where the generated Excel document is saved. Use the folder picker to browse and select it, rather than typing a folder ID by hand.

excelExportSmartService.input.fileName.label=File Name
excelExportSmartService.input.fileName.description=Name of the generated document, without the .xlsx extension.

excelExportSmartService.input.protectionPassword.label=Protection Password
excelExportSmartService.input.protectionPassword.description=Optional password for the sheet protection. Leave blank for no password. This is a deterrent, not encryption - anyone can remove workbook protection with common tools, so do not rely on it to protect sensitive data.

excelExportSmartService.output.documentId.label=Document ID
excelExportSmartService.output.documentId.description=The Appian Document ID of the generated Excel file.
