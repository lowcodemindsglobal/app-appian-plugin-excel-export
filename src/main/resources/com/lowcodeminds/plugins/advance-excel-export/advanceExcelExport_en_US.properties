# Display strings for the "Excel Export" smart service, part of the
# "Advance Excel Export" plug-in.
#
# Path convention, confirmed against a real deployment failure (Appian
# APNX-1-4200-000: "missing internationalization bundle(s) for Locale en_US:
# [com.lowcodeminds.plugins.advance-excel-export.advanceExcelExport]"):
# Appian resolves this bundle the same way java.util.ResourceBundle.getBundle()
# always has - by joining "<plugin-key>.<smart-service-key>" into a single
# basename and treating EVERY dot in it as a directory separator, not a literal
# character. So the required physical path is fully nested:
#   src/main/resources/com/lowcodeminds/plugins/advance-excel-export/advanceExcelExport_en_US.properties
# A prior version of this file lived directly under a single flat folder
# literally named "com.lowcodeminds.plugins.advance-excel-export" (dots kept as
# literal characters) based on an unverified assumption about a sibling
# plug-in's layout - that flat layout is what produced the APNX-1-4200-000
# deployment failure above. Do not revert to it.
#
# The filename is the smart-service key plus a REQUIRED locale suffix
# (_en_US here) - a bare, locale-less filename is not picked up, and en_US is
# the minimum required locale for the plug-in to deploy at all.
#
# Every key is prefixed with the smart-service key ("advanceExcelExport"),
# using .label/.description.

advanceExcelExport.name=Excel Export
advanceExcelExport.description=Runs SQL queries against a JNDI data source and exports the results to a multi-sheet, column-protected Excel (.xlsx) document.

advanceExcelExport.input.SQLSheetDataList.label=SQL Sheet Data List
advanceExcelExport.input.SQLSheetDataList.description=One entry per output sheet: a SQL query (SELECT only, no semicolons anywhere in the text) and the sheet name its results are written to. Maximum 20 entries, each with a unique sheet name (case-insensitive) of 31 characters or fewer, containing none of \\ / ? * [ ] :. This input performs only basic checks, not full SQL parsing - never build a query here by concatenating end-user-supplied text; only use values a trusted process designer authored or fully parameterized/escaped upstream.

advanceExcelExport.input.jndiName.label=Database JNDI Name
advanceExcelExport.input.jndiName.description=JNDI name of the data source to run every query in SQL Sheet Data List against. Must reference a pre-configured, admin-approved data source name only - never a value derived from end-user input.

advanceExcelExport.input.editableColumns.label=Editable Columns
advanceExcelExport.input.editableColumns.description=Column names that stay unlocked for the end user, matched by name (case-insensitive) across every sheet. Every other column, and all headers, are locked.

advanceExcelExport.input.targetFolder.label=Target Folder
advanceExcelExport.input.targetFolder.description=The Appian folder where the generated Excel document is saved. Use the folder picker to browse and select it.

advanceExcelExport.input.NewDocumentName.label=New Document Name
advanceExcelExport.input.NewDocumentName.description=Name of the generated document, without the .xlsx extension.

advanceExcelExport.input.DateFormat.label=Date Format in Excel
advanceExcelExport.input.DateFormat.description=Excel number format applied to DATE columns. Defaults to dd-mm-yyyy if left blank.

advanceExcelExport.input.DateTimeFormat.label=DateTime Format in Excel
advanceExcelExport.input.DateTimeFormat.description=Excel number format applied to TIMESTAMP columns. Defaults to dd-mm-yyyy hh:mm:ss if left blank.

advanceExcelExport.input.NoneEditableHeaderColor.label=Non-Editable Header Color
advanceExcelExport.input.NoneEditableHeaderColor.description=HEX color code for the header of non-editable (locked) columns. Defaults to yellow if left blank. Editable column headers always use a fixed yellow.

advanceExcelExport.input.ExcelPassword.label=Excel Password
advanceExcelExport.input.ExcelPassword.description=Optional password required to open the generated file. Leave blank for no encryption. Sheet-level column protection is always applied regardless of this value and needs no password to remove.

advanceExcelExport.output.NewDocumentCreated.label=Output Excel Document
advanceExcelExport.output.NewDocumentCreated.description=The Appian Document ID of the generated Excel file.

advanceExcelExport.output.ErrorMessage.label=Error Message
advanceExcelExport.output.ErrorMessage.description=Error encountered while generating or saving the Excel file, if any.

# Validation errors, keyed by MessageContainer.addError(acpKey, messageKey, args...)
# in AdvanceExcelExport.validate() - the key is looked up in this bundle, never
# hardcoded as literal text in the Java class.
advanceExcelExport.error.sqlSheetDataListEmpty=SQL Sheet Data List must not be empty.
advanceExcelExport.error.tooManySheets=A maximum of {0} sheets is allowed.
advanceExcelExport.error.sheetNameMissing=Sheet Name is missing.
advanceExcelExport.error.sheetNameTooLong=Sheet Name ''{0}'' exceeds Excel''s {1} character limit.
advanceExcelExport.error.sheetNameIllegalCharacters=Sheet Name ''{0}'' contains a character not allowed in Excel: \\ / ? * [ ] :
advanceExcelExport.error.duplicateSheetName=Sheet Name ''{0}'' is used more than once. Sheet names must be unique (case-insensitive).
advanceExcelExport.error.sqlQueryMissing=SQL Query is missing.
advanceExcelExport.error.sqlQueryNotSelect=SQL Query invalid syntax. Only SELECT statements are allowed.
advanceExcelExport.error.sqlQueryContainsSemicolon=SQL Query must not contain a semicolon anywhere in the text.

# run() failure message, keyed by SmartServiceException.Builder#userMessage in
# AdvanceExcelExport.run(). Deliberately generic and static, with no exception
# detail substituted in - the full underlying exception (which for a
# SQLException can embed table/column/constraint names or query fragments) is
# logged via SLF4J instead, never placed in this process-visible output.
advanceExcelExport.error.executionFailed=Failed to generate the Excel export. See the server logs for details.
